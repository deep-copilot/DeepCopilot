<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline';">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DeepSeek Agent</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}

:root {
  --radius: 6px;
  --gap: 10px;
}

body {
  font-family: var(--vscode-font-family, -apple-system, sans-serif);
  font-size: var(--vscode-font-size, 13px);
  color: var(--vscode-foreground);
  background: var(--vscode-sideBar-background, #252526);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Toolbar ── */
#toolbar {
  display: flex;
  align-items: center;
  padding: 6px 8px;
  gap: 4px;
  border-bottom: 1px solid var(--vscode-panel-border, #3c3c3c);
  flex-shrink: 0;
}
#toolbar .logo {
  flex: 1;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: .5px;
  opacity: .75;
  user-select: none;
}
.tb-btn {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--vscode-icon-foreground, #c5c5c5);
  padding: 3px 7px;
  border-radius: 3px;
  font-size: 11px;
  display: flex;
  align-items: center;
  gap: 3px;
  transition: background .12s;
  white-space: nowrap;
}
.tb-btn:hover { background: var(--vscode-toolbar-hoverBackground, rgba(255,255,255,.09)) }
.tb-btn.active { color: var(--vscode-button-background, #0e7afe) }

/* ── Status bar ── */
#status-bar {
  padding: 3px 10px;
  font-size: 11px;
  color: var(--vscode-descriptionForeground, #888);
  border-bottom: 1px solid var(--vscode-panel-border, #3c3c3c);
  flex-shrink: 0;
  display: none;
}

/* ── Messages ── */
#messages {
  flex: 1;
  overflow-y: auto;
  padding: 10px 10px 4px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  scroll-behavior: smooth;
}
#messages::-webkit-scrollbar { width: 5px }
#messages::-webkit-scrollbar-track { background: transparent }
#messages::-webkit-scrollbar-thumb {
  background: var(--vscode-scrollbarSlider-background, #424242);
  border-radius: 3px;
}

/* message fade-in */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(5px) }
  to   { opacity:1; transform:translateY(0) }
}
.msg { animation: fadeUp .18s ease both }

/* user bubble */
.msg-user {
  background: var(--vscode-input-background, #3c3c3c);
  border: 1px solid var(--vscode-input-border, transparent);
  border-radius: 8px 8px 2px 8px;
  padding: 8px 12px;
  align-self: flex-end;
  max-width: 88%;
  white-space: pre-wrap;
  word-break: break-word;
  font-size: 13px;
  line-height: 1.5;
}

/* assistant bubble */
.msg-assistant { align-self: flex-start; width: 100%; }
.msg-assistant .label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  color: var(--vscode-button-background, #0e7afe);
  margin-bottom: 5px;
  opacity: .9;
}
.msg-content {
  font-size: 13px;
  line-height: 1.65;
  word-break: break-word;
}
.msg-content p { margin: .3em 0 }
.msg-content p:first-child { margin-top: 0 }
.msg-content p:last-child { margin-bottom: 0 }

.msg-content code {
  background: var(--vscode-textPreformat-background, rgba(255,255,255,.1));
  padding: 1px 5px;
  border-radius: 3px;
  font-family: var(--vscode-editor-font-family, monospace);
  font-size: 11.5px;
}

/* code block */
.code-block {
  margin: .7em 0;
  border-radius: var(--radius);
  overflow: hidden;
  border: 1px solid var(--vscode-panel-border, #3c3c3c);
}
.code-header {
  display: flex;
  align-items: center;
  background: var(--vscode-editorGroupHeader-tabsBackground, #2d2d2d);
  padding: 4px 10px;
  font-size: 11px;
  color: var(--vscode-descriptionForeground, #888);
  gap: 4px;
}
.code-header .lang { flex: 1; font-family: monospace }
.code-action {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--vscode-icon-foreground, #c5c5c5);
  padding: 2px 8px;
  border-radius: 3px;
  font-size: 11px;
  transition: background .12s;
}
.code-action:hover {
  background: rgba(255,255,255,.12);
  color: var(--vscode-foreground);
}
.code-block pre {
  background: var(--vscode-editor-background, #1e1e1e);
  padding: 10px 12px;
  margin: 0;
  overflow-x: auto;
  font-family: var(--vscode-editor-font-family, 'Cascadia Code', Consolas, monospace);
  font-size: 12px;
  line-height: 1.5;
  white-space: pre;
}

/* error message */
.msg-error {
  color: var(--vscode-errorForeground, #f48771);
  font-size: 12px;
  padding: 6px 10px;
  background: rgba(244,135,113,.08);
  border-radius: var(--radius);
  border-left: 3px solid var(--vscode-errorForeground, #f48771);
  align-self: flex-start;
  width: 100%;
}

/* ── Thinking indicator ── */
#thinking {
  display: none;
  padding: 2px 10px 8px;
  align-self: flex-start;
}
.dot-row { display: flex; gap: 5px; align-items: center }
.dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--vscode-button-background, #0e7afe);
  opacity: .35;
  animation: pulse .9s infinite ease-in-out;
}
.dot:nth-child(2) { animation-delay: .15s }
.dot:nth-child(3) { animation-delay: .3s }
@keyframes pulse {
  0%,80%,100% { transform:scale(.8); opacity:.35 }
  40%          { transform:scale(1.2); opacity:1 }
}

/* ── Input area ── */
#input-area {
  border-top: 1px solid var(--vscode-panel-border, #3c3c3c);
  padding: 8px;
  flex-shrink: 0;
}
#ctx-bar {
  display: none;
  font-size: 11px;
  color: var(--vscode-button-background, #0e7afe);
  padding: 0 2px 6px;
}
#input-row { display: flex; gap: 6px; align-items: flex-end }
#msg-input {
  flex: 1;
  resize: none;
  background: var(--vscode-input-background, #3c3c3c);
  color: var(--vscode-input-foreground, #cccccc);
  border: 1px solid var(--vscode-input-border, #3c3c3c);
  border-radius: var(--radius);
  padding: 7px 10px;
  font-family: var(--vscode-font-family, inherit);
  font-size: 13px;
  line-height: 1.45;
  min-height: 36px;
  max-height: 140px;
  outline: none;
  transition: border-color .15s;
}
#msg-input:focus { border-color: var(--vscode-focusBorder, #0e7afe) }
#msg-input::placeholder { color: var(--vscode-input-placeholderForeground, #666) }
#send-btn {
  background: var(--vscode-button-background, #0e7afe);
  color: var(--vscode-button-foreground, #fff);
  border: none;
  border-radius: var(--radius);
  width: 34px;
  height: 34px;
  cursor: pointer;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: opacity .15s;
  line-height: 1;
}
#send-btn:hover { opacity: .85 }
#send-btn:disabled { opacity: .38; cursor: default }

/* ── Empty state ── */
#empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  opacity: .45;
  padding: 24px;
  text-align: center;
  pointer-events: none;
}
#empty-state .big { font-size: 32px; line-height: 1 }
#empty-state p { font-size: 12px; line-height: 1.6 }
</style>
</head>
<body>

<!-- Toolbar -->
<div id="toolbar">
  <span class="logo">⚡ DeepSeek Agent</span>
  <button class="tb-btn" id="ctx-btn" title="包含当前文件 / 选中代码">📎 上下文</button>
  <button class="tb-btn" id="clear-btn" title="清空对话">🗑</button>
</div>

<!-- Status -->
<div id="status-bar"></div>

<!-- Messages -->
<div id="messages">
  <div id="empty-state">
    <div class="big">🤖</div>
    <p><strong>DeepSeek Agent</strong><br>向我提问，或在编辑器选中代码<br>后点击「📎 上下文」一起发送</p>
  </div>
</div>

<!-- Thinking dots -->
<div id="thinking">
  <div class="dot-row">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
</div>

<!-- Input -->
<div id="input-area">
  <div id="ctx-bar">📎 将包含当前文件 / 选中代码</div>
  <div id="input-row">
    <textarea id="msg-input" rows="1" placeholder="向 DeepSeek 提问…  Enter 发送 · Shift+Enter 换行"></textarea>
    <button id="send-btn" title="发送 (Enter)">↑</button>
  </div>
</div>

<script>
'use strict';
const vscode = acquireVsCodeApi();

// ── Elements ──────────────────────────────────────────────────────────────────
const msgs      = document.getElementById('messages');
const thinking  = document.getElementById('thinking');
const input     = document.getElementById('msg-input');
const sendBtn   = document.getElementById('send-btn');
const emptyState= document.getElementById('empty-state');
const ctxBar    = document.getElementById('ctx-bar');
const ctxBtn    = document.getElementById('ctx-btn');
const clearBtn  = document.getElementById('clear-btn');
const statusBar = document.getElementById('status-bar');

let ctxActive = false;
let busy      = false;

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// Simple markdown → HTML (code blocks, inline code, bold, newlines)
function renderMd(text) {
  const parts = [];
  let last = 0;
  const re = /```([\w+#.-]*)\n?([\s\S]*?)```/g;
  let m;

  while ((m = re.exec(text)) !== null) {
    // text before code block
    if (m.index > last) parts.push(renderInline(text.slice(last, m.index)));
    const lang = (m[1] || '').trim() || 'plaintext';
    const code = m[2].replace(/\n$/, '');
    const id   = 'cb_' + Math.random().toString(36).slice(2);
    parts.push(
      '<div class="code-block">' +
        '<div class="code-header">' +
          '<span class="lang">' + esc(lang) + '</span>' +
          '<button class="code-action" onclick="copyCode(\'' + id + '\')">复制</button>' +
          '<button class="code-action" onclick="insertCode(\'' + id + '\')">插入编辑器</button>' +
        '</div>' +
        '<pre id="' + id + '">' + esc(code) + '</pre>' +
      '</div>'
    );
    last = re.lastIndex;
  }
  if (last < text.length) parts.push(renderInline(text.slice(last)));
  return parts.join('');
}

function renderInline(text) {
  // Inline code, bold, then wrap paragraphs
  let s = text
    .replace(/`([^`]+)`/g, (_, c) => '<code>' + esc(c) + '</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');

  // Split into paragraphs on double newlines; single newline → <br>
  return s.split(/\n{2,}/).map(para => {
    return '<p>' + para.split('\n').map(esc).join('<br>') + '</p>';
  }).join('');
}

// ── Code block actions ────────────────────────────────────────────────────────
function copyCode(id) {
  const el = document.getElementById(id);
  if (el) vscode.postMessage({ type: 'copy', code: el.textContent });
}
function insertCode(id) {
  const el = document.getElementById(id);
  if (el) vscode.postMessage({ type: 'insert', code: el.textContent });
}

// ── Add message to list ───────────────────────────────────────────────────────
function addMessage(role, text) {
  // Hide empty state
  emptyState.style.display = 'none';

  const div = document.createElement('div');
  div.className = 'msg';

  if (role === 'user') {
    div.className += ' msg-user';
    div.textContent = text;
  } else if (role === 'assistant') {
    div.className += ' msg-assistant';
    div.innerHTML =
      '<div class="label">DEEPSEEK</div>' +
      '<div class="msg-content">' + renderMd(text) + '</div>';
  } else {
    div.innerHTML = '<div class="msg-error">' + esc(text) + '</div>';
  }

  // Insert before thinking indicator
  msgs.insertBefore(div, thinking);
  msgs.scrollTop = msgs.scrollHeight;
}

// ── Send ──────────────────────────────────────────────────────────────────────
function send() {
  const text = input.value.trim();
  if (!text || busy) return;
  addMessage('user', text);
  input.value = '';
  autoResizeInput();
  vscode.postMessage({ type: 'send', text });
}

// ── Textarea auto-resize ──────────────────────────────────────────────────────
function autoResizeInput() {
  input.style.height = '36px';
  input.style.height = Math.min(input.scrollHeight, 140) + 'px';
}

input.addEventListener('input', autoResizeInput);
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
sendBtn.addEventListener('click', send);

// ── Context toggle ────────────────────────────────────────────────────────────
ctxBtn.addEventListener('click', () => {
  ctxActive = !ctxActive;
  ctxBtn.classList.toggle('active', ctxActive);
  ctxBar.style.display = ctxActive ? 'block' : 'none';
  vscode.postMessage({ type: 'contextToggle', active: ctxActive });
});

// ── Clear ─────────────────────────────────────────────────────────────────────
clearBtn.addEventListener('click', () => {
  msgs.querySelectorAll('.msg').forEach(el => el.remove());
  emptyState.style.display = 'flex';
  vscode.postMessage({ type: 'clear' });
});

// ── Messages from extension host ──────────────────────────────────────────────
window.addEventListener('message', e => {
  const m = e.data;
  switch (m.type) {

    case 'thinking':
      busy = m.show;
      thinking.style.display = m.show ? 'block' : 'none';
      sendBtn.disabled = m.show;
      if (m.show) msgs.scrollTop = msgs.scrollHeight;
      break;

    case 'reply':
      addMessage('assistant', m.text);
      break;

    case 'error':
      addMessage('error', m.text);
      break;

    case 'cleared':
      msgs.querySelectorAll('.msg').forEach(el => el.remove());
      emptyState.style.display = 'flex';
      break;

    case 'serverStatus':
      if (!m.running) {
        statusBar.textContent = '⚠ 后端服务器未启动 — 发送消息时将自动启动';
        statusBar.style.display = 'block';
      } else {
        statusBar.style.display = 'none';
      }
      break;

    case 'status':
      statusBar.textContent = m.text;
      statusBar.style.display = 'block';
      break;
  }
});

// Notify host that webview is ready
vscode.postMessage({ type: 'ready' });
</script>
</body>
</html>
